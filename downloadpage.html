<script>
function copycode() {
    navigator.clipboard.writeText(
        document.querySelector("code").innerText
    );

    const mensaje = document.getElementById("copiado");

    mensaje.classList.add("visible");

    setTimeout(() => {
        mensaje.classList.remove("visible");
    }, 1500);
}
</script>

<div id="copy">
    <img src="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/icons/copy.svg" alt="Copiar" width="24"
    onclick="copycode()"
    height="24">
</div>

<span id="copiado">¡Copiado!</span>
